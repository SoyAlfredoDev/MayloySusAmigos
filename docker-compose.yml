services:
  postgres:
    image: postgres:16-alpine
    container_name: mailo-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mailo-medusa
    volumes:
      - mailo_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mailo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - mailo_redis_data:/data

volumes:
  mailo_postgres_data:
  mailo_redis_data:
